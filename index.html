<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomberman</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Bomberman</h1>
            <div class="player-stats">
                <div class="player-1-stats">
                    <h3>Player 1</h3>
                    <div class="stats">
                        <span>Bombs: <span id="p1-bombs">1</span></span>
                        <span>Power: <span id="p1-power">1</span></span>
                    </div>
                    <div class="controls" id="p1-controls">WASD + Shift (bomb) + Ctrl (detonate)</div>
                    <button class="edit-commands-button" type="button" data-player="1">Edit commands</button>
                    <div class="command-editor hidden" id="p1-command-editor" data-player="1"></div>
                </div>
                <div class="player-2-stats">
                    <h3>Player 2</h3>
                    <div class="stats">
                        <span>Bombs: <span id="p2-bombs">1</span></span>
                        <span>Power: <span id="p2-power">1</span></span>
                    </div>
                    <div class="controls" id="p2-controls">Arrows + O (bomb) + P (detonate)</div>
                    <button class="edit-commands-button" type="button" data-player="2">Edit commands</button>
                    <div class="command-editor hidden" id="p2-command-editor" data-player="2"></div>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="544" height="416"></canvas>
        
        <div class="game-info">
            <div class="game-status" id="gameStatus">Press any key to start</div>
        </div>
    </div>

    <div id="gameOverScreen" class="game-over hidden">
        <div class="game-over-content">
            <h2 id="gameOverTitle">Game Over</h2>
            <p id="gameOverMessage">Player 1 Wins!</p>
            <button id="restartButton">Play Again</button>
        </div>
    </div>

    <!-- Game Scripts -->
    <script src="js/controls.js"></script>
    <script src="js/assets.js"></script>
    <script src="js/tiles.js"></script>
    <script src="js/bomb.js"></script>
    <script src="js/flame.js"></script>
    <script src="js/player.js"></script>
    <script src="js/map.js"></script>
    <script src="js/input.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
